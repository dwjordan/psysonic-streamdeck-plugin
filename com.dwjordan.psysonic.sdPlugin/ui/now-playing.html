<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Now Playing</title>
		<script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
	</head>
	<body>
		<sdpi-item label="Server URL">
			<sdpi-textfield setting="serverUrl" placeholder="http://localhost:4533"></sdpi-textfield>
		</sdpi-item>
		<sdpi-item label="Username">
			<sdpi-textfield setting="username"></sdpi-textfield>
		</sdpi-item>
		<sdpi-item label="Password">
			<sdpi-password setting="password"></sdpi-password>
		</sdpi-item>
		<sdpi-item label="Show title">
			<sdpi-checkbox setting="showTitle"></sdpi-checkbox>
		</sdpi-item>
		<sdpi-item label="Refresh (sec)">
			<sdpi-range setting="pollSeconds" min="2" max="30" default="3" showlabels></sdpi-range>
		</sdpi-item>
		<sdpi-item label="Psysonic path">
			<sdpi-textfield setting="psysonicPath" placeholder="/Applications/Psysonic.app/Contents/MacOS/psysonic"></sdpi-textfield>
		</sdpi-item>
	</body>
</html>
